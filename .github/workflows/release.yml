name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install paket
      run: dotnet tool install paket --global

    - name: Restore
      run: msbuild EyesGuard.sln /t:Restore /p:Configuration=Release

    - name: Build
      run: msbuild Source/EyesGuard/EyesGuard.csproj /p:Configuration=Release /p:Platform=AnyCPU

    - name: Create zip
      run: Compress-Archive -Path Source/EyesGuard/bin/Release/* -DestinationPath EyesGuard.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: EyesGuard.zip
        generate_release_notes: true
