# EyesGuard CI - Simplified build
name: EyesGuard CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Restore packages
      run: msbuild EyesGuard.sln /t:Restore /p:Configuration=Release
    
    - name: Build Release
      run: msbuild EyesGuard.sln /p:Configuration=Release /p:Platform=x64
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EyesGuard-Release
        path: Source/EyesGuard/bin/x64/Release
        retention-days: 5