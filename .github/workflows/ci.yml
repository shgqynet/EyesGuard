# EyesGuard CI - Simple build
name: EyesGuard CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install Paket
      run: dotnet tool install --global Paket

    - name: Paket restore
      run: paket restore

    - name: Restore NuGet
      run: nuget restore EyesGuard.sln
    
    - name: Build
      run: MSBuild.exe Source/EyesGuard/EyesGuard.csproj /p:Configuration=Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EyesGuard-Release
        path: Source/EyesGuard/bin/Release/*.exe
        retention-days: 5