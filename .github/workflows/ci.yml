# EyesGuard CI - MSBuild for .NET Framework
name: EyesGuard CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build with MSBuild
      run: |
        & "C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe" EyesGuard.sln /p:Configuration=Release /p:Platform=x64 /t:Build
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EyesGuard-Release
        path: Source/EyesGuard/bin/x64/Release/*.exe
        retention-days: 5