# EyesGuard CD - Simple build
name: EyesGuard CD

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Restore NuGet packages
      run: nuget restore EyesGuard.sln
    
    - name: Build
      run: MSBuild.exe EyesGuard.sln /p:Configuration=Release /p:Platform=x64
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EyesGuard-x64
        path: Source/EyesGuard/bin/x64/Release/*.exe
        retention-days: 5