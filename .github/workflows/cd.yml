# EyesGuard CD - Build and Release
name: EyesGuard CD

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install Paket
      run: dotnet tool install --global Paket

    - name: Paket restore
      run: paket restore

    - name: Restore NuGet packages
      run: nuget restore EyesGuard.sln

    - name: Build
      run: MSBuild.exe Source/EyesGuard/EyesGuard.csproj /p:Configuration=Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EyesGuard
        path: Source/EyesGuard/bin/Release/*.exe
        retention-days: 5

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: EyesGuard ${{ github.ref_name }}
        generate_release_notes: true
        files: Source/EyesGuard/bin/Release/*.exe
