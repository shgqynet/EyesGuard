# EyesGuard CD - Use vswhere to find MSBuild
name: EyesGuard CD

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Find Visual Studio
      uses: actions/download-artifact@v3
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Build with MSBuild
      run: MSBuild.exe EyesGuard.sln /p:Configuration=Release /p:Platform=x64 /t:Build /v:minimal
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EyesGuard-x64
        path: Source/EyesGuard/bin/x64/Release/*.exe
        retention-days: 5