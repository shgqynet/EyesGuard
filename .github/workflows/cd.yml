# EyesGuard CD - Simple dotnet build
name: EyesGuard CD

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'
    
    - name: Build
      run: dotnet build EyesGuard.sln -c Release -r win-x64 --self-contained false
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EyesGuard-win-x64
        path: Source/EyesGuard/bin/Release/net6.0-windows/win-x64
        retention-days: 5