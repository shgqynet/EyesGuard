# EyesGuard CD - MSBuild for .NET Framework
name: EyesGuard CD

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Find MSBuild
      run: |
        Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "MSBuild.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
    
    - name: Build with MSBuild
      run: |
        & "C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe" EyesGuard.sln /p:Configuration=Release /p:Platform=x64 /t:Build
    
    - name: Find exe files
      run: Get-ChildItem -Path . -Recurse -Filter "*.exe" | Select-Object -ExpandProperty FullName
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EyesGuard-x64
        path: |
          Source/EyesGuard/bin/x64/Release/*.exe
        retention-days: 5