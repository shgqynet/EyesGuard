# EyesGuard CD - Simplified build for non-signing
name: EyesGuard CD

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Restore packages
      run: msbuild EyesGuard.sln /t:Restore /p:Configuration=Release
    
    - name: Build Release
      run: msbuild EyesGuard.sln /p:Configuration=Release /p:Platform=x64
    
    - name: Find exe
      run: Get-ChildItem -Path . -Recurse -Filter "*.exe" | Select-Object -ExpandProperty FullName
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EyesGuard-x64
        path: |
          Source/EyesGuard/bin/x64/Release/**/*.exe
          Source/EyesGuard/bin/x64/Release/**/*.dll
        retention-days: 5